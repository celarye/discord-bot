[package]
name = "discord-bot"
description = "A WASM plugin based Discord bot, configurable through YAML."
version = "0.1.0"
authors = ["Eduard Smet <contact@celarye.dev>"]
license = "GPL-3.0-or-later"
edition = "2024"

[features]
dotenv = []

[dependencies]
bytes = "1"
chrono = "0.4"
clap = { version = "4", features = ["derive"] }
dotenvy = "0.15"
indexmap = "2"
reqwest = { version = "0.12", default-features = false, features = [
  "charset",
  "http2",
  "rustls-tls",
  "system-proxy",
] }
serde = "1"
simd-json = "0.16"
serde_yaml_ng = "0.10"
tokio = { version = "1", features = ["full"] }
tokio-cron-scheduler = { version = "0.15", features = ["english"] }
tracing = "0.1"
tracing-subscriber = "0.3"
tracing-appender = "0.2"
twilight-cache-inmemory = "0.16"
twilight-gateway = { version = "0.16", features = ["simd-json"] }
twilight-http = { version = "0.16", features = ["simd-json"] }
twilight-model = "0.16"
wasmtime = { version = "37", features = ["component-model-async"] }
wasmtime-wasi = { version = "37", features = ["p3"] }
wasmtime-wasi-http = { version = "37", features = ["p3"] }
